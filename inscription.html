<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar topbar-auth">
<h1>Application de bulletins scolaires</h1>
</header>

<main class="auth-page">
<div class="auth-card">
<h2>INSCRIPTION</h2>
<p class="subtitle">Créez votre compte</p>

<div class="inscription-box">
<form id="registerForm" novalidate>
<div class="field">
<label for="regNom">Nom</label>
<input type="text" id="regNom" placeholder="ex: DUPONT" required>
</div>

<div class="field">
<label for="regPrenom">Prénom</label>
<input type="text" id="regPrenom" placeholder="ex: Jean" required>
</div>

<div class="field">
<label for="regEmail">Adresse email</label>
<input type="email" id="regEmail" placeholder="exemple@gmail.com" required>
</div>

<div class="field field-icon">
<label for="regPassword">Mot de passe</label>
<input type="password" id="regPassword" placeholder="•••••••••••" required>
<button type="button" class="toggle-eye" aria-label="Afficher le mot de passe">👁</button>
</div>

<div class="field field-icon">
<label for="regConfirm">Confirmer mot de passe</label>
<input type="password" id="regConfirm" placeholder="•••••••••••" required>
<button type="button" class="toggle-eye" aria-label="Afficher le mot de passe">👁</button>
</div>

<p class="error-text" id="regError">Les mots de passe ne correspondent pas.</p>

<button type="submit" class="btn-primary full">S'inscrire</button>
</form>

<p class="small-center">Vous avez déjà un compte ? <a href="connexion.html">Se connecter</a></p>

<div class="alert-success hidden" id="regSuccess">
<p class="ok-line">✅ Inscription effectuée avec succès !</p>
<p class="redirect-line">Redirection vers la page de connexion…</p>
</div>
</div>
</div>
</main>

<script src="script.js"></script>
</body>
</html>
